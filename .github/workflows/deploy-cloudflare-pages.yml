name: Deploy Site to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-cloudflare-pages.yml'
      - 'docs/**'
      - 'local-content/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VitePress site
        run: pnpm docs:build

      - name: Deploy production site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e594b73115a07961107c2037f702acbc
          PAGES_PROJECT_NAME: pingti
        run: |
          pnpm exec wrangler pages deploy docs/.vitepress/dist \
            --project-name "$PAGES_PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-dirty=false
